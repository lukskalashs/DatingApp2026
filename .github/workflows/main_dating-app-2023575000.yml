name: Build and Deploy .NET API (Web Deploy)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x' 

      - name: Build and Publish
        # This compiles the code and puts it in a temporary folder called "publish-out"
        run: dotnet publish -c Release -o ./publish-out

      - name: Web Deploy to MonsterASP
        shell: cmd
        run: |
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" -verb:sync -source:contentPath="${{ github.workspace }}\publish-out" -dest:contentPath="${{ secrets.WD_SITE }}",ComputerName="${{ secrets.WD_SERVER }}",UserName="${{ secrets.WD_USERNAME }}",Password="${{ secrets.WD_PASSWORD }}",AuthType="Basic" -allowUntrusted