<dialog #modalRef class="modal">
  <div class="modal-box">
    <div class="modal-header flex justify-between items-center mb-4">
      <h3 class="font-bold text-lg">
        {{mode === 'create' ? 'Block Member' : 'Edit Block Reason'}}
      </h3>
      <button type="button" class="btn btn-sm btn-circle btn-ghost" (click)="cancel()">✕</button>
    </div>
    
    <div class="modal-body">
      <textarea 
        class="form-control w-full textarea textarea-bordered" 
        rows="4" 
        [(ngModel)]="reason" 
        maxlength="200"
        placeholder="Please provide a reason...">
      </textarea>
      <div class="text-end text-muted mt-1">
        <small>{{reason.length}} / 200 characters</small> 
      </div>
    </div>
    
    <div class="modal-action mt-4">
      <button type="button" class="btn" (click)="cancel()">Cancel</button>
      <button type="button" class="btn btn-error" [disabled]="!reason.trim()" (click)="confirm()">
        Confirm
      </button>
    </div>
  </div>
</dialog>
