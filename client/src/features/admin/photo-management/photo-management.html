<div class="grid grid-cols-6 gap-4">
  @for (photo of photos(); track photo.id) {
    <div class="card bg-base-100 shadow-sm border border-gray-200 p-2">
      <img src="{{photo.url}}" class="img-thumbnail p-1" alt="user image">
      
      <div class="text-center font-bold my-2 text-sm">
        {{photo.displayName}}
      </div>

      <div class="flex w-full gap-2">
        <button class="btn btn-success grow btn-sm" (click)="approvePhoto(photo.id)">Approve</button>
        <button class="btn btn-error grow btn-sm" (click)="rejectPhoto(photo.id)">Reject</button>
      </div>
    </div>
  }
</div>
